<svg xmlns="http://www.w3.org/2000/svg" width="512" height="512" viewBox="0 0 512 512" fill="none">
  <defs>
    <linearGradient id="bg2" x1="60" y1="52" x2="444" y2="452" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#3ADF84"/>
      <stop offset="1" stop-color="#08B864"/>
    </linearGradient>
    <radialGradient id="shine" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(174 130) rotate(36) scale(212 180)">
      <stop offset="0" stop-color="white" stop-opacity="0.35"/>
      <stop offset="1" stop-color="white" stop-opacity="0"/>

    <filter id="ds" x="30" y="34" width="452" height="454" filterUnits="userSpaceOnUse" color-interpolation-filters="sRGB">
      <feDropShadow dx="0" dy="18" stdDeviation="18" flood-color="#0D8E48" flood-opacity="0.25"/>
    </filter>
  </defs>

  <g filter="url(#ds)">
    <rect x="46" y="50" width="420" height="420" rx="116" fill="url(#bg2)"/>
    <rect x="46" y="50" width="420" height="420" rx="116" fill="url(#shine)"/>
  </g>

  <!-- back bubble -->

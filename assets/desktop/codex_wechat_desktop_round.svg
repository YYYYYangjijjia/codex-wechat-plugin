    <circle cx="314" cy="198" r="102" fill="white"/>
    <path d="M250 271L260 230L293 262Z" fill="white"/>
    <circle cx="279" cy="193" r="13" fill="#25C068"/>
    <circle cx="349" cy="193" r="13" fill="#25C068"/>
  </g>

  <!-- front bubble -->
  <g>
    <circle cx="200" cy="271" r="130" fill="white"/>
    <path d="M115 375L132 312L185 355Z" fill="white"/>

    <!-- codex mark -->
